# PostgreSQL only — run local server/client/admin against Docker DB.
#
#   docker compose -f docker-compose.db.yml up -d
#
# Use DATABASE_URL from server/.env.example (host localhost:5433).
# The named volume matches the full stack compose file so data is shared
# if you use both (same project directory name).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg_dev_password
      POSTGRES_DB: rpg_game
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg_game"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
