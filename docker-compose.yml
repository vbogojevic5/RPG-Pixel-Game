services:
  postgres:
    image: postgres:17-alpine
    container_name: rpg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg_dev_password
      POSTGRES_DB: rpg_game
    ports:
      # Host 5433 -> container 5432 (5432 is occupied by a local Postgres install on this machine).
      - "5433:5432"
    volumes:
      - rpg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpg_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rpg_postgres_data:
